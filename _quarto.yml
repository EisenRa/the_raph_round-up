project:
  type: website
  output-dir: docs

resources: 
  - CNAME

website:
  page-navigation: true
  back-to-top-navigation: true
  title: "Eisenhofer Photography"
  site-url: https://eisenra.github.io/the_raph_round-up/
  description: "Eisenhofer Photography"
  navbar:
    left:
      - About.qmd
      - Photography.qmd
      - text: "Blog"
        href: Blog.qmd
      - text: "AI statement"
        href: ai_statement.qmd

    right:
      - icon: camera
        href: https://www.flickr.com/photos/202433373@N03/
      - icon: mastodon
        href: https://genomic.social/@EisenRa
      - icon: github
        href: https://github.com/EisenRa
      - icon: rss
        href: index.xml
  comments:
      giscus: 
        repo: EisenRa/the_raph_round-up
        mapping: "pathname"
        reactions-enabled: true
        input-position: "bottom"
        theme: "light"


format:
  html:
    theme:
      light: flatly
      dark: darkly
    image-lazy-loading: TRUE
    css: styles.css
    include-in-header:
      - text: |
          <script defer src="https://cloud.umami.is/script.js" data-website-id="e2a67f0d-57bf-4127-a586-dd84b56b758f"></script>
    include-after-body: subscribe.html

    
execute:
  freeze: auto
  
editor: visual

